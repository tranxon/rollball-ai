<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentCowork</title>
    <script>
      // Detect system dark mode before React renders — prevents flash of wrong theme
      (function() {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* Inline background matching splash screen — eliminates white/transparent flash
         before React mounts. Overridden by globals.css after load. */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #fafafa;
      }
      html.dark, html.dark body {
        background-color: #18181b;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
