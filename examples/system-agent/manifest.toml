# System Agent — com.acowork.system
# The "system app" of AgentCowork, analogous to Android's Settings/Contacts.
# Always started with Gateway, cannot be uninstalled.

agent_id = "com.acowork.system"
version = "1.0.0"
name = "AgentCowork"
display_name = "AgentCowork"
role = "System Agent"
description = "AgentCowork system agent: manages user identity, preferences, and system-level services"
author = "AgentCowork Team"
runtime_version = "0.1.0"
system = true
dev = false

# System Agent has broad permissions
[[permissions]]
type = "MemoryRead"

[[permissions]]
type = "MemoryWrite"

[[permissions]]
type = "IntentSend"
value = "*"

triggers = []

# System Agent does NOT declare identity_deps — it IS the identity provider
identity_deps = []

# System Agent tools
# Builtin tools are always active — no need to declare them here.
# The [[tools]] section is reserved for future scope-limiting (optional).

[llm]
temperature = 0.5

[memory]
enabled = true
retention_days = 365

[resources]
max_memory_mb = 512
idle_timeout_secs = 0   # System Agent never auto-stops

[sandbox]
enabled = false

# ContentProvider-style capabilities for other agents
# identity:query and identity:observe have been removed — user identity
# is now managed by Gateway via UserProfile (see 18-user-identity-simplified.md)
