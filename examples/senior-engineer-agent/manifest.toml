# Senior Software Engineer Agent
# A multi-skilled senior engineer for code review, architecture, debugging, refactoring, testing, and documentation.

agent_id = "com.rollball.senior-engineer"
version = "1.0.0"
name = "Senior Software Engineer"
display_name = "Engineer"
role = "Senior Engineer"
description = "An experienced senior software engineer capable of code review, architecture design, debugging, refactoring, testing, and documentation."
author = "RollBall Team"
runtime_version = "0.1.0"
system = false
dev = false

identity_deps = ["language", "timezone"]

[[permissions]]
type = "FilesystemRead"

[[permissions]]
type = "FilesystemWrite"

[[permissions]]
type = "Network"

[[permissions]]
type = "Shell"

[[permissions]]
type = "MemoryRead"

[[permissions]]
type = "MemoryWrite"

[[tools]]
name = "file_read"

[[tools]]
name = "doc_reader"

[[tools]]
name = "file_write"

[[tools]]
name = "shell"

[[tools]]
name = "http_request"

[[tools]]
name = "memory_store"

[[tools]]
name = "memory_recall"

[llm]
temperature = 0.3

[llm.providers.openai]
model = "gpt-4o"
api_key_ref = "vault:openai_key"

[llm.providers.claude]
model = "claude-sonnet-4"
api_key_ref = "vault:anthropic_key"

[llm.routing]
strategy = "quality_priority"
fallback_order = ["openai", "claude"]

[llm.budget]
max_output_tokens = 8192
exceeded_action = "warn"

[memory]
enabled = true
retention_days = 180

[resources]
max_memory_mb = 512
idle_timeout_secs = 3600

[sandbox]
enabled = false

[capabilities.code_review]
description = "Perform a thorough code review with actionable feedback"

[capabilities.architecture_design]
description = "Design system architecture with module breakdown and interface definitions"

[capabilities.debug_assist]
description = "Debug and troubleshoot issues with systematic root-cause analysis"
